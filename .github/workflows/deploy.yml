name: Publier l'app sur GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le projet
        uses: actions/checkout@v4

      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Installer les dependances
        run: pnpm install --frozen-lockfile

      - name: Construire l'app
        run: pnpm build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Envoyer les fichiers
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Publier
        id: deployment
        uses: actions/deploy-pages@v4
